version: 2
renderer: networkd
ethernets:
  # Management interface (DHCP) - ens18
  ens18:
    dhcp4: true
    dhcp4-overrides:
      use-dns: true
      use-ntp: true
  # Dev zone interface (10.10.0.1/24) - ens19
  ens19:
    addresses:
      - 10.10.0.1/24
    dhcp4: false
  # Prod zone interface (10.20.0.1/24) - ens20
  ens20:
    addresses:
      - 10.20.0.1/24
    dhcp4: false
  # Infra zone interface (10.30.0.1/24) - ens21
  ens21:
    addresses:
      - 10.30.0.1/24
    dhcp4: false

